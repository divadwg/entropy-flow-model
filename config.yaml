grid:
  height: 10
  width: 40
  n_modes: 16

energy:
  E_in: 100.0

dynamics:
  loss_rate_empty: 0.05
  loss_rate_passive: 0.01
  loss_rate_active: 0.02
  transform_strength: 0.3
  lateral_spread: 0.1

states:
  active_fraction: 0.1
  passive_fraction: 0.2
  persistence_threshold: 0.8
  persistence_strength: 0.8
  throughput_decay: 0.7
  replication_prob: 0.15
  mutation_rate: 0.01
  spontaneous_create_rate: 0.005

simulation:
  n_steps: 500
  n_seeds: 10

sweeps:
  n_seeds: 5
  n_steps: 300
  persistence_strength: [0.0, 0.3, 0.6, 0.8, 0.95]
  replication_prob: [0.0, 0.05, 0.15, 0.3, 0.5]
  transform_strength: [0.05, 0.15, 0.3, 0.5, 0.8]
  mutation_rate: [0.0, 0.005, 0.01, 0.05, 0.1]
  E_in: [20.0, 50.0, 100.0, 200.0, 500.0]

evolution:
  n_steps: 3000
  n_seeds: 12
  transform_cost: 0.50
  trait_mutation_std: 0.03
  mutation_sweep: [0.0, 0.01, 0.03, 0.1, 0.3]
  ablation_n_seeds: 5
  ablation_n_steps: 500

suite:
  frozen_search_seeds: 3
  frozen_search_steps: 500
  compare_seeds: 8
  compare_steps: 3000
  env_seeds: 5
  env_steps: 3000
  ablation_seeds: 5
  ablation_steps: 1000
  longrun_seeds: 3
  longrun_steps: 8000

reinforcement:
  n_steps: 1500
  n_seeds: 8
  regime: 3
  persistence_strength: 0.4
  epsilon_sweep: [0.0, 0.05, 0.1, 0.2, 0.4]
  decay_rate: 0.995
  max_score: 10.0
  path_dep_seeds: 10
  path_dep_steps: 800

decoupling:
  n_steps: 1500
  n_seeds: 8
  regime: 3
  modes:
    - {mode: "none", label: "baseline"}
    - {mode: "lifetime_cap", lifetime_cap: 50, label: "cap_50"}
    - {mode: "lifetime_cap", lifetime_cap: 150, label: "cap_150"}
    - {mode: "random_override", random_override_prob: 0.05, label: "override_5%"}
    - {mode: "random_override", random_override_prob: 0.15, label: "override_15%"}
    - {mode: "throughput_blind", throughput_mix: 0.0, label: "blind"}
    - {mode: "throughput_blind", throughput_mix: 0.5, label: "half_blind"}
    - {mode: "anti_coupled", anti_coupling_strength: 1.0, label: "anti_coupled"}
  path_dep_seeds: 10
  path_dep_steps: 800

output_dir: output
plots_dir: plots
evo_output_dir: evo_output
evo_plots_dir: evo_plots
suite_output_dir: suite_output
suite_plots_dir: suite_plots
